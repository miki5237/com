<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Effect06</title>
    <link rel="stylesheet" href="assets/css/pre.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Abel&display=swap');

        @font-face {
            font-family: 'GmarketSansMedium';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face { font-family: 'S-CoreDream-2ExtraLight'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-2ExtraLight.woff') format('woff'); font-weight: normal; font-style: normal; }
        * {margin: 0;padding: 0;box-sizing: border-box;}
        a {text-decoration: none;color: #666;}
        img {width: 100%; vertical-align: top;}
        ul {padding: 10px 20px;}
        body {
            background: url(assets/img/photo.jpg) no-repeat center center;
            background-size: cover;
            font-family: 'Abel', 'GmarketSansMedium';
            color: #fff;
            height: 100vh;
            transition: all 0.2s;
            /* cursor: none; */
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100vh;
            background: rgba(215, 120, 194, 0.8);
            z-index: -1;
        }
        .info {position: absolute; left: 0; top: 0; z-index: 1000;padding: 20px;}
        .info p { margin-top: 10px;}
        /* info2 */
        .info2 {
            position: absolute; right: 0; top: 0; z-index: 1000;
            padding: 30px;
            font-weight: bold;
        }
        .info2 li {list-style: none;margin-bottom: 5px;}
        .info2 li a{color: #fff;}
        .info2 li.active a {border-bottom: 1px dashed #fff;}
        /* infor3 */
        .infor3 {
            position: absolute; right: 0; bottom: 0; z-index: 1000;
            padding: 30px;
            font-weight: bold;
        }
        .infor3 li a{color: #fff;}
        .infor3 li.active a {border-bottom: 1px dashed #fff;}

        .cOpne {position: absolute; left: 0; bottom: 0; z-index: 1000; padding: 20px;}
        .cOpne a {color: #fff; border: 1px solid #fff; border-radius: 30px; padding: 5px 30px}
        .cOpne .modal {
            background: rgba(0,0,0,0.8);
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 100%;
            left: 0;
            text-align: left;
            transition: all 600ms cubic-bezier(0.86, 0, 0.07, 1);
        }
        .cOpne .modal.show {
            top: 0;
        }
        .cOpne .modal .close {
            position: absolute; right: 10px; top: 20px;
        }
        /* contents */
        .contents {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; height: 100vh;
            flex-direction: column;
            position: relative;
        }
        .cursor {
            position: fixed;
            width: 200px;
            height: 200px;
            background: #fff;
            border-radius: 50%;
            z-index: 1000;
            user-select: none;
            pointer-events: none;
            transform: scale(1);
            transition: transform 0.3s ease-in-out;
            color: #fff;
            box-sizing: content-box;
            background: url(assets/img/photo.jpg) no-repeat center center;
        }
        .mtext {
            font-size: 2vw;
            position: absolute;
            left: 50%; bottom: 50%;
            width: 40vw;
            height: 15vw;
            transform: translate3d(-50%, 68%, 150px); 
            text-align: center;
            border-radius: 1px;
        }
        /* .mtext .word{
            text-shadow: 10px 10px 0 rgba(255,255,255,0.7),
                        10px -10px 0 rgba(255, 166, 166, 0.7),
                        -10px 10px 0 rgba(255, 136, 0, 0.7),
                        -10px -10px 0 rgba(251, 255, 0, 0.7);
        } */
    </style>

</head>
<body>
    <div class="info">
        <h1>Mouse Effect07</h1>
        <p>마우스 따라다니기</p>
    </div>

    <div class="info2">
        <ul>
            <li><a href="mouse01.html">Mouse01</a></li>
            <li><a href="mouse02.html">Mouse02</a></li>
            <li><a href="mouse03.html">Mouse03</a></li>
            <li><a href="mouse04.html">Mouse04</a></li>
            <li><a href="mouse05.html">Mouse05</a></li>
            <li><a href="mouse06.html">Mouse06</a></li>
            <li class="active"><a href="mouse07.html">Mouse07</a></li>
        </ul>
    </div>

    <div class="cOpne">
        <a href="#" class="view">소스보기</a>
        <!-- modal -->
        <div class="modal">
            <div class="code-editor">   
                <span class="control"></span>
                <span class="control"></span>
                <span class="control"></span>
<pre class="line-numbers"><code class="language-js">       
</code></pre>    
            </div>
            <a class="close">Close</a>
        </div>
    </div>
    <!---contents-->
    

    <div class="contents">
        <div class="move-image">
            <!-- <div class="mimg">
                <img class="img" src="juan-ordonez-MciiCsnl6rY-unsplash.jpg"></div> -->
            <div class="mtext">
                <p>The die is cast.</p>
                <p>주사위는 던져졌다.</p>
            </div>
        </div>
    </div>

    <!-- contents -->
    <div class="cursor"></div>


    <!-- script -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery-ui.min.js"></script>
    <script src="assets/js/gsap.min.js"></script>
    <script src="assets/js/pre.js"></script>
    <script>
        const cursor = document.querySelector(".cursor")
        document.addEventListener("mouseover",function(e){
            let w = e.pageX
            let h = e.pageY

            gasp.to(cursor, 0.3, {left: w, top: h});
        });
    </script>
</body>
</html>
